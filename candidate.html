<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Portal - Media Cap</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Iconify for Icons -->
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primaryDark: '#007867',
                        primary: '#00A76F',
                        primaryLight: '#5BE49B',
                        accent: '#FFAB00',
                        light: '#F9FAFB',
                        dark: '#212B36',
                        graytext: '#637381',
                        bordercolor: 'rgba(145, 158, 171, 0.24)'
                    },
                    fontFamily: {
                        sans: ['"Public Sans"', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 0 2px 0 rgba(145, 158, 171, 0.2), 0 12px 24px -4px rgba(145, 158, 171, 0.12)',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F9FAFB; }
        .smooth-hover { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body class="text-dark font-sans flex flex-col min-h-screen antialiased selection:bg-primary selection:text-white">

    <!-- Top Navigation -->
    <header class="bg-white border-b border-bordercolor border-dashed z-20 sticky top-0 h-20 flex items-center">
        <div class="max-w-[1200px] w-full mx-auto px-6">
            <div class="flex justify-between items-center w-full">
                
                <!-- Logo -->
                <div class="flex items-center gap-3">
                    <img src="logo.png" alt="Logo" class="w-8 h-8 object-contain">
                    <h1 class="text-xl font-bold text-dark tracking-tight">Media Cap</h1>
                </div>

                <!-- Right Nav -->
                <div class="flex items-center gap-4 relative">
                    <!-- Notifications -->
                    <button id="btn-bell" class="relative w-10 h-10 rounded-full text-graytext hover:bg-light smooth-hover flex items-center justify-center">
                        <iconify-icon icon="mynaui:bell" class="text-xl"></iconify-icon>
                        <span id="bell-icon-count" class="absolute top-1 right-1 w-4 h-4 bg-[#FF4842] rounded-full hidden text-[9px] text-white font-bold flex items-center justify-center border border-white"></span>
                    </button>
                    <!-- User Profile Dropdown Toggle -->
                    <div class="relative">
                        <button id="btn-profile" class="flex items-center gap-3 pl-2 pr-4 py-1.5 bg-white border border-bordercolor border-dashed rounded-full hover:bg-light smooth-hover">
                            <div id="nav-profile-initial" class="w-8 h-8 rounded-full bg-[#E1F3EA] flex items-center justify-center text-primary font-bold text-sm">
                                C
                            </div>
                            <span id="nav-profile-name" class="font-bold text-sm text-dark hidden sm:block">Candidate</span>
                            <iconify-icon icon="mynaui:chevron-down" class="text-graytext"></iconify-icon>
                        </button>
                        
                        <!-- Dropdown Menu -->
                        <div id="logout-menu" class="absolute top-full mt-2 right-0 bg-white border border-bordercolor border-dashed shadow-hover rounded-xl p-2 w-32 z-50 hidden opacity-0 transition-all transform origin-top-right scale-95">
                            <button id="btn-logout" class="w-full flex items-center justify-center gap-2 px-3 py-2.5 text-sm font-bold text-[#FF4842] hover:bg-[#FF4842]/10 rounded-lg smooth-hover">
                                Logout
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 max-w-[1200px] mx-auto w-full px-6 py-8 md:py-12 flex flex-col lg:flex-row gap-8 relative z-0">
        
        <!-- Main Column (Tasks & Overview) -->
        <div class="w-full lg:w-2/3 space-y-6">
            
            <!-- Welcome Header (Minimals Style) -->
            <div class="bg-white rounded-2xl p-8 flex items-center justify-between overflow-hidden shadow-soft border border-transparent hover:border-primary/20 smooth-hover">
                <div>
                    <h2 class="text-2xl font-bold text-dark mb-2">Welcome back!</h2>
                    <p class="text-sm text-graytext">Here is what's happening with your projects today.</p>
                </div>
                <div class="hidden sm:flex w-16 h-16 bg-[#E1F3EA] text-primary rounded-full items-center justify-center">
                    <iconify-icon icon="mynaui:sparkles" class="text-3xl"></iconify-icon>
                </div>
            </div>

            <!-- Task Viewer -->
            <div class="bg-white rounded-2xl border-none shadow-soft p-8">
                <div class="flex items-center justify-between mb-8 border-b border-bordercolor border-dashed pb-4">
                    <h3 class="text-lg font-bold text-dark flex items-center gap-2">
                        Current Tasks
                    </h3>
                    <span id="active-tasks-count" class="bg-light text-graytext text-xs font-bold px-3 py-1 rounded-lg">0 Active</span>
                </div>
                
                <div id="candidate-tasks-container" class="space-y-4">
                    <p class="text-graytext font-medium text-sm text-center py-8">Loading tasks...</p>
                </div>
            </div>
        </div>

        <!-- Right Side Column (Stats & Alerts) -->
        <div class="w-full lg:w-1/3 space-y-6">
            
            <div class="grid grid-cols-2 gap-4">
                <!-- Attendance Stat -->
                <div class="bg-[#007867] text-white p-6 rounded-2xl shadow-soft flex flex-col justify-between">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-xs font-bold tracking-wider uppercase opacity-80">Attendance</span>
                        <iconify-icon icon="mynaui:check-circle" class="text-2xl opacity-50"></iconify-icon>
                    </div>
                    <div id="cand-attendance" class="text-3xl font-bold">--%</div>
                </div>

                <!-- Score Stat -->
                <div class="bg-white p-6 rounded-2xl shadow-soft border border-light flex flex-col justify-between">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-xs font-bold tracking-wider uppercase text-graytext">Score</span>
                        <iconify-icon icon="mynaui:star" class="text-2xl text-[#FFAB00]"></iconify-icon>
                    </div>
                    <div id="cand-score" class="text-3xl font-bold text-dark">--<span class="text-lg text-graytext font-medium">/10</span></div>
                </div>
            </div>

            <!-- Alerts / Notifications -->
            <div class="bg-white rounded-2xl shadow-soft p-6">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-lg font-bold text-dark">Alerts</h3>
                </div>

                <div id="candidate-notifs-container" class="space-y-4 max-h-[400px] overflow-y-auto pr-2">
                    <p class="text-graytext font-medium text-sm text-center py-8">Loading alerts...</p>
                </div>
                
                <button id="btn-view-all-notifs" class="w-full mt-6 py-2.5 text-dark font-bold text-sm rounded-lg hover:bg-light smooth-hover border border-bordercolor border-dashed">View All</button>
            </div>
            
        </div>
    </main>

    <!-- All Notifications Modal -->
    <div id="notifs-modal" class="fixed inset-0 bg-dark/50 z-50 hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-2xl shadow-hover flex flex-col max-h-[90vh] transform scale-95 transition-transform duration-300" id="notifs-modal-content">
            <div class="p-6 border-b border-bordercolor border-dashed flex justify-between items-center">
                <h3 class="text-xl font-bold text-dark">All Alerts</h3>
                <button id="btn-close-notifs-modal" class="w-8 h-8 rounded-full bg-light text-graytext hover:text-dark flex items-center justify-center smooth-hover">
                    <iconify-icon icon="mynaui:x" class="text-xl"></iconify-icon>
                </button>
            </div>
            <div class="p-6 overflow-y-auto flex-1 space-y-4" id="all-notifs-modal-container">
                <p class="text-graytext text-center font-medium">Loading alerts...</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/candidate.js"></script>
    <script>
        const btnProfile = document.getElementById('btn-profile');
        const logoutMenu = document.getElementById('logout-menu');

        btnProfile.addEventListener('click', () => {
            if(logoutMenu.classList.contains('hidden')) {
                logoutMenu.classList.remove('hidden');
                setTimeout(() => {
                    logoutMenu.classList.remove('opacity-0', 'scale-95');
                    logoutMenu.classList.add('opacity-100', 'scale-100');
                }, 10);
            } else {
                logoutMenu.classList.remove('opacity-100', 'scale-100');
                logoutMenu.classList.add('opacity-0', 'scale-95');
                setTimeout(() => logoutMenu.classList.add('hidden'), 200);
            }
        });
    </script>
</body>
</html>
